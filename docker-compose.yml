services:
  numerolog-calc:
    build: .
    image: ai_numerolog:latest
    restart: unless-stopped
    network_mode: host
    command: ["python", "-m", "calc_service.main"]
    volumes:
      - ./bot:/app/bot
      - ./calc_service:/app/calc_service

  ai-numerolog:
    build: .
    image: ai_numerolog:latest
    restart: unless-stopped
    network_mode: host
    depends_on:
      - numerolog-calc
    env_file:
      - .env
    volumes:
      - ./bot:/app/bot
      - ./calc_service:/app/calc_service
      - ./prompts:/app/prompts
      - ./data:/data
